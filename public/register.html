<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A&F Chat — Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-center">
        <div class="panel-left">
            <div class="panel-right">
                <div class="form-header">
                    <h1>Crear cuenta</h1>
                    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
                </div>
                <div class="form-grid">
                    <div id="error-box" class="error-box"></div>
                    <div id="success-box" class="success-box"></div>
                <div class="field">
                    <label>Nombre</label>
                    <input type="text" id="nombre" placeholder="Nombre" />
                </div>
                <div class="field">
                    <label>Apellido paterno</label>
                    <input type="text" id="apellido_p" placeholder="Apellido paterno" />
                </div>
                <div class="field">
                    <label>Apellido materno</label>
                    <input type="text" id="apellido_m" placeholder="Apellido materno" />
                </div>
                <div class="field">
                    <label>Fecha de nacimiento</label>
                    <input type="date" id="fecha_nacimiento" />
                </div>
                <div class="field full">
                    <label>Correo electrónico</label>
                    <input type="email" id="correo" placeholder="usuario@correo.com" />
                </div>
                <div class="info-note">
                    Tu contraseña será enviada a tu correo.
                </div>
                <button class="btn" id="btn-register" onclick="doRegister()">
                    <span id="btn-text">Crear cuenta</span>
                    <div class="spinner" id="spinner"></div>
                </button>
        </div>
            </div>
        </div>
    </div>
<script src="register.js"></script>
</body>
</html>
